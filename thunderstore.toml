[config]
schemaVersion = "0.0.1"

[package]
namespace = "HiarlyScripter"
name = "LootPulse"
versionNumber = "1.0.0"
description = "Press F to pulse-scan all valuables in range -- shows discover brackets and adds map icons. Resilient to game updates via reflection-based API fallbacks."
websiteUrl = "https://discord.com/users/hiarly_ferreira"
containsNsfwContent = false

[package.dependencies]
"BepInEx-BepInExPack" = "5.4.2305"

[build]
icon = "./package/icon.png"
readme = "./package/README.md"
outdir = "./build"

[publish]
repository = "https://thunderstore.io"
communities = ["repo"]
